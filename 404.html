<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 Page Not Found - PlumbMaster Premium Plumbing Template</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Font Awesome 6 Free -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- AOS Animation CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet" />
    <!-- Custom Global Style -->
    <link href="/assets/css/style.css" rel="stylesheet" />
    
    <!-- Immersive Page-Specific 404 Styles -->
    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--bg-body);
        overflow-x: hidden;
        position: relative;
      }

      .error-wrapper {
        max-width: 600px;
        width: 100%;
        padding: 40px 20px;
        text-align: center;
        position: relative;
        z-index: 2;
      }

      /* Leaking Pipe Animation Structure */
      .pipeline-visual {
        position: relative;
        width: 240px;
        height: 160px;
        margin: 0 auto 30px auto;
      }

      .main-pipe {
        position: absolute;
        top: 60px;
        left: 0;
        width: 240px;
        height: 24px;
        background: linear-gradient(90deg, #4A5568 0%, #718096 50%, #4A5568 100%);
        border: 2px solid var(--border-color);
        border-radius: 12px;
        box-shadow: var(--shadow-md);
      }

      .pipe-joint {
        position: absolute;
        top: 48px;
        left: 100px;
        width: 40px;
        height: 48px;
        background: linear-gradient(180deg, #2D3748 0%, #4A5568 50%, #2D3748 100%);
        border: 2px solid var(--color-orange);
        border-radius: 6px;
        box-shadow: var(--shadow-sm);
      }

      .water-leak {
        position: absolute;
        top: 94px;
        left: 118px;
        width: 4px;
        height: 0;
        background-color: #3182ce;
        border-radius: 2px;
        animation: streamPour 2.5s infinite linear;
        opacity: 0.8;
        box-shadow: 0 0 10px rgba(49, 130, 206, 0.5);
      }

      .water-droplet-1 {
        position: absolute;
        top: 94px;
        left: 112px;
        width: 8px;
        height: 12px;
        background-color: #63b3ed;
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        animation: dropDrip 2s infinite ease-in-out;
      }

      .water-droplet-2 {
        position: absolute;
        top: 94px;
        left: 122px;
        width: 6px;
        height: 10px;
        background-color: #4299e1;
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        animation: dropDrip 1.7s infinite ease-in-out 0.4s;
      }

      .water-splash {
        position: absolute;
        bottom: 10px;
        left: 110px;
        width: 24px;
        height: 6px;
        background-color: rgba(99, 179, 237, 0.4);
        border-radius: 50%;
        animation: splashRipple 1.2s infinite ease-out;
      }

      @keyframes streamPour {
        0% { height: 0; opacity: 0; }
        15% { height: 10px; opacity: 0.8; }
        80% { height: 60px; opacity: 0.8; }
        100% { height: 60px; opacity: 0; transform: translateY(10px); }
      }

      @keyframes dropDrip {
        0% { transform: translateY(0) scale(0.5); opacity: 0; }
        30% { opacity: 1; transform: translateY(5px) scale(1); }
        90% { opacity: 1; }
        100% { transform: translateY(70px) scale(0.6); opacity: 0; }
      }

      @keyframes splashRipple {
        0% { transform: scale(0.2); opacity: 0; }
        50% { opacity: 0.8; }
        100% { transform: scale(1.6); opacity: 0; }
      }

      .error-code {
        font-family: var(--font-heading);
        font-size: 8rem;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.05em;
        background: linear-gradient(135deg, var(--color-orange) 0%, #FF8A65 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 10px;
        filter: drop-shadow(0 4px 10px rgba(255, 87, 34, 0.15));
      }

      .search-404-card {
        background: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius-md);
        padding: 6px;
        display: flex;
        align-items: center;
        gap: 8px;
        max-width: 450px;
        margin: 30px auto;
        transition: all 0.3s ease;
      }
      .search-404-card:focus-within {
        border-color: var(--color-orange);
        box-shadow: var(--shadow-glow);
      }
      .search-404-input {
        background: transparent;
        border: none;
        color: var(--text-primary);
        font-size: 15px;
        flex: 1;
        padding: 8px 12px;
      }
      .search-404-input:focus {
        outline: none;
      }
      .search-404-btn {
        background: var(--color-orange);
        color: white;
        border: none;
        border-radius: var(--border-radius-sm);
        padding: 8px 18px;
        font-family: var(--font-heading);
        font-weight: 600;
        transition: all 0.3s ease;
      }
      .search-404-btn:hover {
        background: var(--color-orange-hover);
      }

      .theme-float {
        position: absolute;
        top: 30px;
        right: 30px;
        z-index: 10;
      }

      .floating-bg-element {
        position: absolute;
        opacity: 0.02;
        pointer-events: none;
        z-index: 0;
        animation: floatEffect 12s infinite ease-in-out;
      }
    </style>
  </head>
  <body>

    <!-- Floating Theme Toggler -->
    <div class="theme-float">
      <button class="theme-toggle-btn" aria-label="Toggle Theme">
        <i class="fa-solid fa-sun"></i>
      </button>
    </div>

    <!-- Background decorative patterns -->
    <svg class="floating-bg-element" style="top: 15%; left: 10%; width: 100px; height: 100px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
    <svg class="floating-bg-element" style="bottom: 15%; right: 10%; width: 120px; height: 120px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M11 2a9 9 0 0 1 9 9v1a9 9 0 0 1-9 9l-1 .01A9 9 0 0 1 2 11V10a9 9 0 0 1 9-9z"/></svg>

    <div class="error-wrapper">
      
      <!-- 404 Leaking Pipe Visual -->
      <div class="pipeline-visual" data-aos="zoom-in">
        <div class="main-pipe"></div>
        <div class="pipe-joint"></div>
        <div class="water-leak"></div>
        <div class="water-droplet-1"></div>
        <div class="water-droplet-2"></div>
        <div class="water-splash"></div>
      </div>

      <!-- Error Code -->
      <div class="error-code" data-aos="fade-up">404</div>

      <!-- Error message -->
      <div data-aos="fade-up" data-aos-delay="100">
        <h1 class="h3 text-white fw-bold mb-3">Whoops! Looks Like a Pipeline Burst...</h1>
        <p class="text-secondary mb-0">The page you are looking for has been removed, renamed, or is temporarily clogged. Let us help you locate your destination path.</p>
      </div>

      <!-- Integrated Search Utility -->
      <div data-aos="fade-up" data-aos-delay="200">
        <form class="search-404-card" onsubmit="event.preventDefault(); window.location.href='services.html';">
          <i class="fa-solid fa-magnifying-glass text-secondary ms-3" style="width:18px;height:18px;; font-size: 18px; line-height: 1; display: inline-flex; align-items: center; justify-content: center;"></i>
          <input type="text" class="search-404-input" placeholder="Search services, products, news..." required />
          <button type="submit" class="search-404-btn">Search</button>
        </form>
      </div>

      <!-- Action Navigation Buttons -->
      <div class="d-flex flex-wrap justify-content-center gap-3" data-aos="fade-up" data-aos-delay="300">
        <a href="index.html" class="btn-premium">
          <i class="fa-solid fa-house" style="width:16px;height:16px;; font-size: 16px; line-height: 1; display: inline-flex; align-items: center; justify-content: center;"></i>
          Back To Home Base
        </a>
        <a href="contact.html" class="btn-premium-secondary">
          <i class="fa-solid fa-phone-volume" style="width:16px;height:16px;; font-size: 16px; line-height: 1; display: inline-flex; align-items: center; justify-content: center;"></i>
          Contact Support Desk
        </a>
      </div>

    </div>

    <!-- Lucide Vector Icons Library CDN -->
    
    <!-- AOS Animation Engine CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <!-- Custom Theme JS Control -->
    <script src="/assets/js/main.js"></script>

  </body>
</html>
